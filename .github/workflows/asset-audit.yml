name: Audit profile assets

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify README image references
        shell: pwsh
        run: |
          $readme = Get-Content -Raw readme.md
          $missing = @()
          [regex]::Matches($readme, 'src="([^"]+)"') | ForEach-Object {
            $src = $_.Groups[1].Value
            if ($src.StartsWith("./")) {
              $path = $src.Substring(2)
              if (-not (Test-Path $path)) {
                $missing += $path
              }
            }
          }
          if ($missing.Count -gt 0) {
            throw "Missing README assets: $($missing -join ', ')"
          }

      - name: Verify SVG XML
        shell: pwsh
        run: |
          $bad = @()
          Get-ChildItem -Recurse -Include *.svg | ForEach-Object {
            try {
              [xml](Get-Content -Raw $_.FullName) | Out-Null
            } catch {
              $bad += "$($_.FullName): $($_.Exception.Message)"
            }
          }
          if ($bad.Count -gt 0) {
            throw "Invalid SVG XML: $($bad -join '; ')"
          }
