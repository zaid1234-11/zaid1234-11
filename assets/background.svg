<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ambient profile background</title>
  <desc id="desc">A slow-moving aurora background with fog, particles, noise, and perspective grid.</desc>
  <defs>
    <linearGradient id="bg-base" x1="0" y1="0" x2="1200" y2="720"><stop stop-color="#050608"/><stop offset=".5" stop-color="#111318"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <radialGradient id="bg-a" cx="50%" cy="50%" r="50%"><stop stop-color="#7DE7E0" stop-opacity=".42"/><stop offset=".52" stop-color="#7AA7FF" stop-opacity=".13"/><stop offset="1" stop-color="#050608" stop-opacity="0"/></radialGradient>
    <radialGradient id="bg-b" cx="50%" cy="50%" r="50%"><stop stop-color="#E8C875" stop-opacity=".26"/><stop offset=".5" stop-color="#F4A7B9" stop-opacity=".12"/><stop offset="1" stop-color="#050608" stop-opacity="0"/></radialGradient>
    <filter id="bg-blur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="bg-noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .08"/></feComponentTransfer>
    </filter>
    <pattern id="bg-grid" width="54" height="54" patternUnits="userSpaceOnUse"><path d="M54 0H0V54" stroke="#FFFFFF" stroke-opacity=".04"/></pattern>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg-base)"/>
  <rect width="1200" height="720" rx="36" fill="url(#bg-grid)"/>
  <g filter="url(#bg-blur)">
    <ellipse cx="796" cy="170" rx="380" ry="170" fill="url(#bg-a)">
      <animate attributeName="cx" values="760;850;760" dur="34s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="326" cy="540" rx="390" ry="180" fill="url(#bg-b)">
      <animate attributeName="cy" values="500;570;500" dur="38s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <path d="M120 630C282 524 438 490 604 520C786 553 940 486 1080 360" stroke="#FFFFFF" stroke-opacity=".08"/>
  <g opacity=".56">
    <circle cx="118" cy="144" r="2" fill="#F7F8FA"><animate attributeName="cy" values="144;126;144" dur="16s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="612" r="2" fill="#7DE7E0"><animate attributeName="cy" values="612;590;612" dur="18s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="96" r="2.5" fill="#E8C875"><animate attributeName="cy" values="96;120;96" dur="20s" repeatCount="indefinite"/></circle>
    <circle cx="1048" cy="520" r="2" fill="#A996FF"><animate attributeName="cy" values="520;494;520" dur="22s" repeatCount="indefinite"/></circle>
  </g>
  <rect width="1200" height="720" rx="36" filter="url(#bg-noise)" opacity=".6"/>
  <!-- inspect: ambient only; content should carry the experience -->
</svg>
