<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Build with care</title>
  <desc id="desc">A restrained poster-style contact section saying Build with care. Ship with taste.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360"><stop stop-color="#050608"/><stop offset="1" stop-color="#10131A"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop stop-color="#7DE7E0" stop-opacity=".2"/><stop offset="1" stop-color="#050608" stop-opacity="0"/></radialGradient>
    <filter id="blur" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="38"/></filter>
    <style>.h{font:700 72px Arial,sans-serif}.link{font:700 14px Arial,sans-serif;letter-spacing:3px}.ghost{font:700 120px Arial,sans-serif;letter-spacing:-7px}</style>
  </defs>
  <rect width="1200" height="360" rx="36" fill="url(#bg)"/>
  <ellipse cx="860" cy="116" rx="280" ry="120" fill="url(#glow)" filter="url(#blur)"/>
  <text x="80" y="138" class="h" fill="#F7F8FA">Build with care.</text>
  <text x="80" y="222" class="h" fill="#F7F8FA">Ship with taste.</text>
  <path d="M734 236H1018" stroke="#FFFFFF" stroke-opacity=".16"/>
  <text x="736" y="280" class="link" fill="#7DE7E0">PORTFOLIO</text>
  <text x="884" y="280" class="link" fill="#F7F8FA">GITHUB</text>
  <text x="1002" y="280" class="link" fill="#E8C875" text-anchor="end">LINKEDIN</text>
  <text x="938" y="158" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: contact as signature, not CTA box -->
</svg>
