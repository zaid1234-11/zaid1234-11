<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Living Design System</title>
  <desc id="desc">A poster-like living design system composition built around five principles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560"><stop stop-color="#07090D"/><stop offset=".56" stop-color="#10131A"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <linearGradient id="beam" x1="160" y1="430" x2="1030" y2="170"><stop stop-color="#7DE7E0"/><stop offset=".34" stop-color="#A996FF"/><stop offset=".68" stop-color="#E8C875"/><stop offset="1" stop-color="#F4A7B9"/></linearGradient>
    <filter id="blur" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="42"/></filter>
    <style>.k{font:700 12px Arial,sans-serif;letter-spacing:4px}.h{font:700 88px Arial,sans-serif}.word{font:700 30px Arial,sans-serif}.small{font:400 15px Arial,sans-serif}.ghost{font:700 170px Arial,sans-serif;letter-spacing:-8px}</style>
  </defs>
  <rect width="1200" height="560" rx="36" fill="url(#bg)"/>
  <ellipse cx="720" cy="286" rx="420" ry="180" fill="#7DE7E0" opacity=".1" filter="url(#blur)">
    <animate attributeName="cx" values="660;780;660" dur="32s" repeatCount="indefinite"/>
  </ellipse>
  <text x="80" y="92" class="k" fill="#7DE7E0">LIVING DESIGN SYSTEM</text>
  <text x="78" y="202" class="h" fill="#F7F8FA">Principles</text>
  <text x="78" y="296" class="h" fill="#F7F8FA">that move.</text>
  <path d="M148 432C308 260 438 454 596 302C748 156 870 286 1052 178" stroke="url(#beam)" stroke-width="5" stroke-linecap="round"/>
  <g fill="#F7F8FA">
    <circle cx="148" cy="432" r="8"/>
    <circle cx="374" cy="334" r="8"/>
    <circle cx="596" cy="302" r="8"/>
    <circle cx="812" cy="246" r="8"/>
    <circle cx="1052" cy="178" r="8"/>
  </g>
  <text x="196" y="452" class="word" fill="#F7F8FA">Precision</text>
  <text x="392" y="302" class="word" fill="#F7F8FA">Motion</text>
  <text x="624" y="348" class="word" fill="#F7F8FA">Performance</text>
  <text x="774" y="214" class="word" fill="#F7F8FA">Curiosity</text>
  <text x="936" y="144" class="word" fill="#F7F8FA">Systems</text>
  <text x="82" y="494" class="small" fill="#AEB7C5">A brand behaves best when its rules are alive.</text>
  <text x="956" y="520" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: no tiles; principles live on one moving path -->
</svg>
