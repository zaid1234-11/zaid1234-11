<svg width="1600" height="140" viewBox="0 0 1600 140" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="wave" x1="0" y1="70" x2="1600" y2="70">
    <stop offset="0%" stop-color="#7C5CFC"/>
    <stop offset="50%" stop-color="#38BDF8"/>
    <stop offset="100%" stop-color="#4FD1C5"/>
</linearGradient>

<linearGradient id="fade" x1="0" y1="0" x2="1600" y2="0">
    <stop offset="0%" stop-color="white" stop-opacity="0"/>
    <stop offset="15%" stop-color="white" stop-opacity=".25"/>
    <stop offset="50%" stop-color="white" stop-opacity=".85"/>
    <stop offset="85%" stop-color="white" stop-opacity=".25"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
</linearGradient>

<filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6"/>
</filter>

</defs>

<!-- Background guide -->

<line
x1="0"
y1="70"
x2="1600"
y2="70"
stroke="url(#fade)"
stroke-opacity=".08"/>

<!-- Main animated wave -->

<path
d="M0 70
C180 20
360 120
540 70
720 20
900 120
1080 70
1260 20
1440 120
1600 70"

stroke="url(#wave)"
stroke-width="2.5"
stroke-linecap="round"
fill="none">

<animate
attributeName="d"
dur="12s"
repeatCount="indefinite"
values="
M0 70 C180 20 360 120 540 70 720 20 900 120 1080 70 1260 20 1440 120 1600 70;
M0 70 C180 120 360 20 540 70 720 120 900 20 1080 70 1260 120 1440 20 1600 70;
M0 70 C180 20 360 120 540 70 720 20 900 120 1080 70 1260 20 1440 120 1600 70"/>
</path>

<!-- Glow -->

<path
d="M0 70
C180 20
360 120
540 70
720 20
900 120
1080 70
1260 20
1440 120
1600 70"

stroke="url(#wave)"
stroke-width="8"
stroke-linecap="round"
opacity=".18"
fill="none"
filter="url(#glow)">

<animate
attributeName="d"
dur="12s"
repeatCount="indefinite"
values="
M0 70 C180 20 360 120 540 70 720 20 900 120 1080 70 1260 20 1440 120 1600 70;
M0 70 C180 120 360 20 540 70 720 120 900 20 1080 70 1260 120 1440 20 1600 70;
M0 70 C180 20 360 120 540 70 720 20 900 120 1080 70 1260 20 1440 120 1600 70"/>
</path>

<!-- Floating dots -->

<g fill="white">

<circle cx="220" cy="70" r="2">
    <animate attributeName="cy" values="66;74;66" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".2;1;.2" dur="4s" repeatCount="indefinite"/>
</circle>

<circle cx="520" cy="70" r="2">
    <animate attributeName="cy" values="74;66;74" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".2;1;.2" dur="5s" repeatCount="indefinite"/>
</circle>

<circle cx="800" cy="70" r="2.5">
    <animate attributeName="r" values="2;3;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".3;1;.3" dur="3s" repeatCount="indefinite"/>
</circle>

<circle cx="1080" cy="70" r="2">
    <animate attributeName="cy" values="66;74;66" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".2;1;.2" dur="4.5s" repeatCount="indefinite"/>
</circle>

<circle cx="1380" cy="70" r="2">
    <animate attributeName="cy" values="74;66;74" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".2;1;.2" dur="5.5s" repeatCount="indefinite"/>
</circle>

</g>

</svg>