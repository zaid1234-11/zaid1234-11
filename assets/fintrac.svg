<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="900" y2="520">
    <stop offset="0%" stop-color="#0B1020"/>
    <stop offset="100%" stop-color="#111827"/>
</linearGradient>

<linearGradient id="primary" x1="180" y1="120" x2="700" y2="420">
    <stop offset="0%" stop-color="#7C5CFC"/>
    <stop offset="50%" stop-color="#38BDF8"/>
    <stop offset="100%" stop-color="#4FD1C5"/>
</linearGradient>

<filter id="blur">
    <feGaussianBlur stdDeviation="35"/>
</filter>

<filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="20" stdDeviation="18" flood-opacity=".35"/>
</filter>

</defs>

<!-- Background -->

<rect width="900" height="520" rx="36" fill="url(#bg)"/>

<!-- Ambient Glow -->

<circle
cx="700"
cy="120"
r="160"
fill="url(#primary)"
opacity=".25"
filter="url(#blur)">

<animate
attributeName="cy"
values="120;170;120"
dur="8s"
repeatCount="indefinite"/>

</circle>

<!-- Glass Window -->

<rect
x="60"
y="60"
width="780"
height="400"
rx="28"
fill="white"
fill-opacity=".05"
stroke="white"
stroke-opacity=".10"/>

<!-- Window Controls -->

<circle cx="95" cy="95" r="6" fill="#FF5F57"/>
<circle cx="118" cy="95" r="6" fill="#FEBC2E"/>
<circle cx="141" cy="95" r="6" fill="#28C840"/>

<!-- Heading -->

<text
x="100"
y="150"
fill="white"
font-size="42"
font-family="Inter,Segoe UI"
font-weight="700">
FinTrac AI
</text>

<text
x="100"
y="185"
fill="#9CA3AF"
font-size="20"
font-family="Inter">
Financial Intelligence Operating System
</text>

<!-- Dashboard Card -->

<rect
x="100"
y="235"
width="320"
height="150"
rx="20"
fill="white"
fill-opacity=".06"
stroke="white"
stroke-opacity=".10"/>

<text
x="125"
y="270"
fill="#9CA3AF"
font-size="14"
font-family="Inter">
NET WORTH
</text>

<text
x="125"
y="320"
fill="white"
font-size="34"
font-family="Inter"
font-weight="700">
₹ 12.8L
</text>

<text
x="125"
y="355"
fill="#4FD1C5"
font-size="18"
font-family="Inter">
▲ +14.8%
</text>

<!-- Graph -->

<path
d="M500 350
L560 320
L610 330
L665 250
L720 265
L770 210"

stroke="url(#primary)"
stroke-width="5"
stroke-linecap="round"
stroke-linejoin="round"
filter="url(#shadow)">

<animate
attributeName="stroke-dasharray"
values="0 500;500 0"
dur="2.5s"
fill="freeze"/>

</path>

<!-- Points -->

<g fill="#38BDF8">

<circle cx="560" cy="320" r="6">
<animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
</circle>

<circle cx="610" cy="330" r="6">
<animate attributeName="r" values="5;7;5" dur="2.4s" repeatCount="indefinite"/>
</circle>

<circle cx="665" cy="250" r="6">
<animate attributeName="r" values="5;8;5" dur="2.1s" repeatCount="indefinite"/>
</circle>

<circle cx="720" cy="265" r="6">
<animate attributeName="r" values="5;7;5" dur="2.8s" repeatCount="indefinite"/>
</circle>

<circle cx="770" cy="210" r="6">
<animate attributeName="r" values="5;8;5" dur="2.2s" repeatCount="indefinite"/>
</circle>

</g>

<!-- Bottom Tags -->

<g>

<rect
x="100"
y="415"
width="95"
height="34"
rx="17"
fill="#7C5CFC"
fill-opacity=".15"/>

<text
x="148"
y="437"
fill="white"
font-size="14"
text-anchor="middle"
font-family="Inter">
Next.js
</text>

<rect
x="210"
y="415"
width="90"
height="34"
rx="17"
fill="#38BDF8"
fill-opacity=".15"/>

<text
x="255"
y="437"
fill="white"
font-size="14"
text-anchor="middle"
font-family="Inter">
AI
</text>

<rect
x="315"
y="415"
width="120"
height="34"
rx="17"
fill="#4FD1C5"
fill-opacity=".15"/>

<text
x="375"
y="437"
fill="white"
font-size="14"
text-anchor="middle"
font-family="Inter">
Supabase
</text>

</g>

</svg>