<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Designed Engineered Iterated</title>
  <desc id="desc">A final typographic signature: Designed. Engineered. Iterated. Zaid Saifi.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280"><stop stop-color="#050608"/><stop offset="1" stop-color="#07090D"/></linearGradient>
    <style>.word{font:700 52px Arial,sans-serif}.sig{font:400 18px Arial,sans-serif}.ghost{font:700 130px Arial,sans-serif;letter-spacing:-8px}</style>
  </defs>
  <rect width="1200" height="280" rx="36" fill="url(#bg)"/>
  <text x="80" y="94" class="word" fill="#F7F8FA">Designed.</text>
  <text x="328" y="154" class="word" fill="#F7F8FA">Engineered.</text>
  <text x="696" y="214" class="word" fill="#F7F8FA">Iterated.</text>
  <text x="82" y="230" class="sig" fill="#AEB7C5">Zaid Saifi</text>
  <text x="934" y="146" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: the ending is whitespace plus signature -->
</svg>
