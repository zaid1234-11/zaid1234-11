<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1600" y2="900">
      <stop offset="0%" stop-color="#04060F"/>
      <stop offset="45%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#060913"/>
    </linearGradient>

    <linearGradient id="gridGlow" x1="0" y1="0" x2="1600" y2="900">
      <stop offset="0%" stop-color="#7C5CFC" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#4FD1C5" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="primaryGradient" x1="150" y1="100" x2="1400" y2="760">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="45%" stop-color="#4F9BFF"/>
      <stop offset="100%" stop-color="#4FD1C5"/>
    </linearGradient>

    <radialGradient id="purpleGlow">
      <stop offset="0%" stop-color="#7C5CFC" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blueGlow">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="greenGlow">
      <stop offset="0%" stop-color="#4FD1C5" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#4FD1C5" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurBig" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

    <filter id="blurMed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity=".35"/>
    </filter>

    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" stroke="white" stroke-opacity=".035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGradient)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity=".45"/>

  <g filter="url(#blurBig)">
    <circle cx="240" cy="180" r="220" fill="url(#purpleGlow)"/>
    <circle cx="1280" cy="160" r="240" fill="url(#blueGlow)"/>
    <circle cx="850" cy="740" r="300" fill="url(#greenGlow)"/>
  </g>

  <g opacity=".35">
    <circle cx="160" cy="130" r="1.2" fill="white"/>
    <circle cx="380" cy="90" r="1.1" fill="white"/>
    <circle cx="590" cy="210" r="1.3" fill="white"/>
    <circle cx="770" cy="80" r="1.5" fill="white"/>
    <circle cx="980" cy="170" r="1.2" fill="white"/>
    <circle cx="1170" cy="100" r="1.4" fill="white"/>
    <circle cx="1450" cy="210" r="1.3" fill="white"/>
    <circle cx="280" cy="720" r="1.3" fill="white"/>
    <circle cx="620" cy="820" r="1.1" fill="white"/>
    <circle cx="1340" cy="760" r="1.4" fill="white"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="220" width="960" height="520" rx="72" fill="#050B16" fill-opacity=".18"/>
  </g>

  <g>
    <rect x="340" y="240" width="920" height="480" rx="72" fill="#0D1524" stroke="#FFFFFF" stroke-opacity=".08" stroke-width="1.5"/>
    <rect x="360" y="260" width="880" height="420" rx="50" fill="#09101C"/>
    <rect x="430" y="300" width="740" height="320" rx="36" fill="#081017" stroke="#FFFFFF" stroke-opacity=".05" stroke-width="1"/>

    <rect x="640" y="320" width="320" height="8" rx="4" fill="#152033" opacity=".95"/>
    <circle cx="800" cy="324" r="4" fill="#0F172A"/>

    <rect x="520" y="360" width="560" height="18" rx="9" fill="#FFFFFF" fill-opacity=".05"/>
    <rect x="520" y="398" width="560" height="18" rx="9" fill="#FFFFFF" fill-opacity=".05"/>
    <rect x="520" y="436" width="420" height="18" rx="9" fill="#FFFFFF" fill-opacity=".05"/>
    <rect x="520" y="474" width="320" height="18" rx="9" fill="#FFFFFF" fill-opacity=".05"/>

    <text x="800" y="408" text-anchor="middle" fill="#F8FAFF" font-size="64" font-family="Courier New, Courier, monospace" font-weight="800" letter-spacing="8">ZAID SAIFI</text>
    <text x="800" y="466" text-anchor="middle" fill="#7C5CFC" font-size="20" font-family="Courier New, Courier, monospace" font-weight="700" letter-spacing="6">FRONTEND ENGINEER</text>
    <text x="800" y="498" text-anchor="middle" fill="#38BDF8" font-size="20" font-family="Courier New, Courier, monospace" font-weight="700" letter-spacing="5">PRODUCT DESIGNER • AI BUILDER</text>
    <text x="800" y="538" text-anchor="middle" fill="#A5B4FC" font-size="16" font-family="Courier New, Courier, monospace" letter-spacing="3">Crafting clean interfaces with code and motion</text>
  </g>

  <g opacity=".45">
    <rect x="460" y="660" width="680" height="18" rx="9" fill="#0D141F"/>
    <rect x="490" y="684" width="620" height="8" rx="4" fill="#132039"/>
    <rect x="570" y="706" width="420" height="6" rx="3" fill="#15223D"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="760" width="760" height="36" rx="18" fill="#0F172A" fill-opacity=".96"/>
  </g>

</svg>
