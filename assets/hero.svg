<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Software with taste</title>
  <desc id="desc">A poster-like keynote hero for Zaid Saifi with an off-center ZS orbital mark and large typography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680">
      <stop stop-color="#050608"/>
      <stop offset=".48" stop-color="#10131A"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop stop-color="#7DE7E0" stop-opacity=".42"/>
      <stop offset=".45" stop-color="#7AA7FF" stop-opacity=".15"/>
      <stop offset="1" stop-color="#050608" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm" cx="50%" cy="50%" r="50%">
      <stop stop-color="#E8C875" stop-opacity=".28"/>
      <stop offset=".55" stop-color="#F4A7B9" stop-opacity=".11"/>
      <stop offset="1" stop-color="#050608" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="760" y1="92" x2="1044" y2="398">
      <stop stop-color="#F7F8FA"/>
      <stop offset=".34" stop-color="#7DE7E0"/>
      <stop offset=".7" stop-color="#A996FF"/>
      <stop offset="1" stop-color="#E8C875"/>
    </linearGradient>
    <filter id="blur" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="44"/></filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity=".42"/></filter>
    <style>
      .name{font:700 16px Arial,sans-serif;letter-spacing:6px}
      .display{font:700 116px Arial,sans-serif;letter-spacing:0}
      .chip{font:700 14px Arial,sans-serif;letter-spacing:3px}
      .ghost{font:700 180px Arial,sans-serif;letter-spacing:-10px}
    </style>
  </defs>
  <rect width="1200" height="680" rx="38" fill="url(#bg)"/>
  <g filter="url(#blur)">
    <ellipse cx="862" cy="176" rx="360" ry="176" fill="url(#aura)">
      <animate attributeName="cx" values="812;910;812" dur="30s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="246" cy="564" rx="410" ry="190" fill="url(#warm)">
      <animate attributeName="cy" values="522;590;522" dur="36s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <text x="70" y="622" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>

  <g transform="translate(868 220)" filter="url(#glow)">
    <circle r="126" fill="#050608" fill-opacity=".54"/>
    <circle r="184" stroke="#FFFFFF" stroke-opacity=".07"/>
    <circle r="226" stroke="#FFFFFF" stroke-opacity=".035"/>
    <g transform-origin="0 0">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="52s" repeatCount="indefinite"/>
      <path d="M-72 -42H58L-70 64H74" stroke="url(#mark)" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M-22 -88C58 -78 100 -16 54 52C22 100 -52 90 -88 28" stroke="#F7F8FA" stroke-opacity=".46" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <text x="84" y="112" class="name" fill="#9CA3AF">ZAID SAIFI</text>
  <text x="82" y="290" class="display" fill="#F7F8FA">Software</text>
  <text x="82" y="414" class="display" fill="#F7F8FA">with taste.</text>

  <path d="M86 494H376" stroke="#FFFFFF" stroke-opacity=".18"/>
  <text x="86" y="548" class="chip" fill="#7DE7E0">AI</text>
  <text x="184" y="548" class="chip" fill="#F7F8FA">DESIGN</text>
  <text x="342" y="548" class="chip" fill="#E8C875">FRONTEND</text>

  <circle cx="1056" cy="516" r="2" fill="#E8C875"><animate attributeName="cy" values="516;486;516" dur="20s" repeatCount="indefinite"/></circle>
  <circle cx="624" cy="104" r="2" fill="#7DE7E0"><animate attributeName="cy" values="104;132;104" dur="18s" repeatCount="indefinite"/></circle>
  <circle cx="458" cy="570" r="1.6" fill="#A996FF"/>
  <!-- inspect: a keynote poster, not a hero card -->
</svg>
