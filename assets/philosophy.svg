<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Engineering with taste</title>
  <desc id="desc">A keynote poster for engineering principles: systems, performance, motion, and AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520"><stop stop-color="#050608"/><stop offset=".55" stop-color="#10131A"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <linearGradient id="ring" x1="520" y1="94" x2="1058" y2="420"><stop stop-color="#7DE7E0"/><stop offset=".36" stop-color="#E8C875"/><stop offset=".68" stop-color="#A996FF"/><stop offset="1" stop-color="#F4A7B9"/></linearGradient>
    <filter id="blur" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="38"/></filter>
    <style>.k{font:700 12px Arial,sans-serif;letter-spacing:4px}.h{font:700 82px Arial,sans-serif}.word{font:700 24px Arial,sans-serif}.ghost{font:700 150px Arial,sans-serif;letter-spacing:-8px}</style>
  </defs>
  <rect width="1200" height="520" rx="36" fill="url(#bg)"/>
  <ellipse cx="806" cy="256" rx="320" ry="160" fill="#7DE7E0" opacity=".09" filter="url(#blur)"/>
  <text x="80" y="86" class="k" fill="#7DE7E0">ENGINEERING PHILOSOPHY</text>
  <text x="78" y="194" class="h" fill="#F7F8FA">Engineering</text>
  <text x="78" y="286" class="h" fill="#F7F8FA">with taste.</text>
  <circle cx="828" cy="254" r="126" stroke="url(#ring)" stroke-width="5"/>
  <path d="M828 128V380M702 254H954" stroke="#FFFFFF" stroke-opacity=".08"/>
  <text x="794" y="118" class="word" fill="#F7F8FA">Systems</text>
  <text x="932" y="262" class="word" fill="#F7F8FA">Motion</text>
  <text x="742" y="410" class="word" fill="#F7F8FA">Performance</text>
  <text x="628" y="262" class="word" fill="#F7F8FA">AI</text>
  <text x="90" y="452" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: one ring, four principles -->
</svg>
