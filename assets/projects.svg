<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Four product worlds</title>
  <desc id="desc">A poster overview connecting four product worlds through a single asymmetric path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560"><stop stop-color="#050608"/><stop offset=".55" stop-color="#111318"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <linearGradient id="line" x1="170" y1="430" x2="1040" y2="150"><stop stop-color="#7DE7E0"/><stop offset=".35" stop-color="#F4A7B9"/><stop offset=".7" stop-color="#E8C875"/><stop offset="1" stop-color="#7AA7FF"/></linearGradient>
    <style>.k{font:700 12px Arial,sans-serif;letter-spacing:4px}.h{font:700 78px Arial,sans-serif}.name{font:700 22px Arial,sans-serif}.ghost{font:700 150px Arial,sans-serif;letter-spacing:-8px}</style>
  </defs>
  <rect width="1200" height="560" rx="36" fill="url(#bg)"/>
  <text x="80" y="86" class="k" fill="#7DE7E0">FEATURED WORK</text>
  <text x="78" y="188" class="h" fill="#F7F8FA">Product</text>
  <text x="78" y="270" class="h" fill="#F7F8FA">worlds.</text>
  <path d="M176 430C316 222 444 470 590 310C746 140 874 298 1040 150" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="176" cy="430" r="10" fill="#7DE7E0"/><text x="206" y="438" class="name" fill="#F7F8FA">FinTrac AI</text>
  <circle cx="444" cy="360" r="10" fill="#F4A7B9"/><text x="472" y="330" class="name" fill="#F7F8FA">RetroLab</text>
  <circle cx="740" cy="222" r="10" fill="#E8C875"/><text x="770" y="258" class="name" fill="#F7F8FA">SalesSphere</text>
  <circle cx="1040" cy="150" r="10" fill="#7AA7FF"/><text x="912" y="118" class="name" fill="#F7F8FA">Portfolio</text>
  <text x="924" y="522" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: overview as poster, not grid -->
</svg>
