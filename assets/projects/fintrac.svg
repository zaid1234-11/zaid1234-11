<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FinTrac AI operating system poster</title>
  <desc id="desc">A poster-like financial operating system with an orbital decision core and future simulation paths.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640"><stop stop-color="#041012"/><stop offset=".56" stop-color="#0D151C"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <linearGradient id="orbit" x1="290" y1="520" x2="1010" y2="104"><stop stop-color="#7DE7E0"/><stop offset=".5" stop-color="#7AA7FF"/><stop offset="1" stop-color="#E8C875"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop stop-color="#7DE7E0" stop-opacity=".38"/><stop offset=".6" stop-color="#7AA7FF" stop-opacity=".12"/><stop offset="1" stop-color="#050608" stop-opacity="0"/></radialGradient>
    <filter id="blur" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="42"/></filter>
    <style>.k{font:700 12px Arial,sans-serif;letter-spacing:4px}.h{font:700 86px Arial,sans-serif}.small{font:600 15px Arial,sans-serif;letter-spacing:2px}.ghost{font:700 150px Arial,sans-serif;letter-spacing:-8px}</style>
  </defs>
  <rect width="1200" height="640" rx="36" fill="url(#bg)"/>
  <ellipse cx="704" cy="314" rx="390" ry="230" fill="url(#glow)" filter="url(#blur)"/>
  <text x="80" y="86" class="k" fill="#7DE7E0">FINTRAC AI</text>
  <text x="78" y="198" class="h" fill="#F7F8FA">Financial</text>
  <text x="78" y="290" class="h" fill="#F7F8FA">OS.</text>
  <text x="80" y="354" fill="#AEB7C5" style="font:400 23px Arial,sans-serif">Not a tracker. A decision layer.</text>
  <g transform="translate(770 322)">
    <circle r="92" fill="#050608" fill-opacity=".56"/>
    <circle r="158" stroke="#FFFFFF" stroke-opacity=".07"/>
    <circle r="224" stroke="#FFFFFF" stroke-opacity=".045"/>
    <path d="M-246 116C-128 -44 -52 70 0 0C70 -94 128 -18 248 -160" stroke="url(#orbit)" stroke-width="5" stroke-linecap="round" stroke-dasharray="0 850">
      <animate attributeName="stroke-dasharray" values="0 850;850 0" dur="4s" fill="freeze"/>
    </path>
    <circle cx="0" cy="0" r="10" fill="#F7F8FA"/>
    <circle cx="-246" cy="116" r="7" fill="#7DE7E0"/>
    <circle cx="248" cy="-160" r="7" fill="#E8C875"/>
    <text x="-36" y="-14" class="small" fill="#AEB7C5">87%</text>
    <text x="-70" y="42" class="small" fill="#F7F8FA">CONFIDENCE</text>
  </g>
  <text x="944" y="546" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: one memorable thing: the decision orbit -->
</svg>
