<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio cascade poster</title>
  <desc id="desc">A premium poster composition for a portfolio experience built around a cascading case study path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640"><stop stop-color="#06080D"/><stop offset=".58" stop-color="#111722"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <linearGradient id="flow" x1="210" y1="450" x2="1010" y2="154"><stop stop-color="#7AA7FF"/><stop offset=".45" stop-color="#A996FF"/><stop offset="1" stop-color="#7DE7E0"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop stop-color="#7AA7FF" stop-opacity=".36"/><stop offset=".62" stop-color="#A996FF" stop-opacity=".12"/><stop offset="1" stop-color="#050608" stop-opacity="0"/></radialGradient>
    <filter id="blur" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="42"/></filter>
    <style>.k{font:700 12px Arial,sans-serif;letter-spacing:4px}.h{font:700 84px Arial,sans-serif}.label{font:700 14px Arial,sans-serif;letter-spacing:2px}.ghost{font:700 150px Arial,sans-serif;letter-spacing:-8px}</style>
  </defs>
  <rect width="1200" height="640" rx="36" fill="url(#bg)"/>
  <ellipse cx="802" cy="232" rx="380" ry="190" fill="url(#glow)" filter="url(#blur)"/>
  <text x="80" y="86" class="k" fill="#7AA7FF">PORTFOLIO</text>
  <text x="78" y="198" class="h" fill="#F7F8FA">Case studies</text>
  <text x="78" y="290" class="h" fill="#F7F8FA">that move.</text>
  <path d="M230 450C348 278 472 482 596 312C716 148 842 338 1010 154" stroke="url(#flow)" stroke-width="6" stroke-linecap="round" stroke-dasharray="0 1000">
    <animate attributeName="stroke-dasharray" values="0 1000;1000 0" dur="4s" fill="freeze"/>
  </path>
  <g fill="#FFFFFF" fill-opacity=".07">
    <rect x="174" y="394" width="120" height="92" rx="20"/>
    <rect x="430" y="376" width="132" height="100" rx="22"/>
    <rect x="706" y="244" width="142" height="108" rx="24"/>
    <rect x="934" y="96" width="154" height="120" rx="26"/>
  </g>
  <path d="M202 426H266M202 452H244M460 410H530M460 438H508M742 286H812M742 314H792M972 142H1048M972 172H1024" stroke="#FFFFFF" stroke-opacity=".2" stroke-linecap="round"/>
  <text x="192" y="546" class="label" fill="#AEB7C5">BROWSER -> SCROLL -> MOTION -> CASE STUDY</text>
  <text x="932" y="560" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: one memorable thing: the cascading product story -->
</svg>
