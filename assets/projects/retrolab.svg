<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RetroLab transformation poster</title>
  <desc id="desc">A poster composition showing a diagonal transformation river from original image to community artifact.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640"><stop stop-color="#08070B"/><stop offset=".52" stop-color="#15111B"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <linearGradient id="flow" x1="136" y1="488" x2="1054" y2="150"><stop stop-color="#F4A7B9"/><stop offset=".32" stop-color="#A996FF"/><stop offset=".66" stop-color="#7DE7E0"/><stop offset="1" stop-color="#E8C875"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop stop-color="#F4A7B9" stop-opacity=".35"/><stop offset=".6" stop-color="#A996FF" stop-opacity=".12"/><stop offset="1" stop-color="#050608" stop-opacity="0"/></radialGradient>
    <filter id="blur" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="42"/></filter>
    <pattern id="dither" width="12" height="12" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#F4A7B9" opacity=".32"/><rect x="6" y="6" width="6" height="6" fill="#7DE7E0" opacity=".24"/></pattern>
    <style>.k{font:700 12px Arial,sans-serif;letter-spacing:4px}.h{font:700 82px Arial,sans-serif}.label{font:700 14px Arial,sans-serif;letter-spacing:2px}.ascii{font:700 15px Consolas,monospace}.ghost{font:700 150px Arial,sans-serif;letter-spacing:-8px}</style>
  </defs>
  <rect width="1200" height="640" rx="36" fill="url(#bg)"/>
  <ellipse cx="500" cy="428" rx="410" ry="200" fill="url(#glow)" filter="url(#blur)"/>
  <text x="80" y="86" class="k" fill="#F4A7B9">RETROLAB</text>
  <text x="78" y="198" class="h" fill="#F7F8FA">Image</text>
  <text x="78" y="286" class="h" fill="#F7F8FA">becomes</text>
  <text x="78" y="374" class="h" fill="#F7F8FA">artifact.</text>
  <path d="M160 500C302 280 414 548 554 330C702 98 832 378 1052 150" stroke="url(#flow)" stroke-width="6" stroke-linecap="round" stroke-dasharray="0 1180">
    <animate attributeName="stroke-dasharray" values="0 1180;1180 0" dur="4.2s" fill="freeze"/>
  </path>
  <g fill="#FFFFFF" fill-opacity=".07">
    <circle cx="160" cy="500" r="62"/><circle cx="356" cy="344" r="56"/><circle cx="554" cy="330" r="62"/><circle cx="766" cy="284" r="56"/><circle cx="1052" cy="150" r="62"/>
  </g>
  <circle cx="160" cy="500" r="30" fill="#F4A7B9" opacity=".74"/>
  <text x="326" y="348" class="ascii" fill="#F7F8FA">@#%</text>
  <rect x="524" y="300" width="60" height="60" fill="url(#dither)"/>
  <rect x="730" y="254" width="72" height="50" rx="8" fill="#050608" stroke="#7DE7E0" stroke-opacity=".5"/>
  <circle cx="1032" cy="136" r="14" fill="#E8C875"/><circle cx="1062" cy="136" r="14" fill="#7DE7E0"/><circle cx="1047" cy="168" r="14" fill="#F4A7B9"/>
  <text x="138" y="594" class="label" fill="#AEB7C5">ORIGINAL -> ASCII -> DITHER -> CRT -> COMMUNITY</text>
  <text x="944" y="560" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: one memorable thing: the transformation river -->
</svg>
