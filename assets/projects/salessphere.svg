<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="900" y2="520">
    <stop offset="0%" stop-color="#0A1018"/>
    <stop offset="100%" stop-color="#141C28"/>
</linearGradient>

<linearGradient id="gold" x1="120" y1="100" x2="780" y2="420">
    <stop offset="0%" stop-color="#F8D57E"/>
    <stop offset="40%" stop-color="#D6A85C"/>
    <stop offset="100%" stop-color="#8C5A2B"/>
</linearGradient>

<radialGradient id="glow">
    <stop offset="0%" stop-color="#D6A85C" stop-opacity=".45"/>
    <stop offset="100%" stop-color="#D6A85C" stop-opacity="0"/>
</radialGradient>

<filter id="blur">
    <feGaussianBlur stdDeviation="40"/>
</filter>

<filter id="shadow">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-opacity=".35"/>
</filter>

</defs>

<!-- Background -->

<rect width="900" height="520" rx="36" fill="url(#bg)"/>

<!-- Ambient -->

<circle
cx="730"
cy="120"
r="180"
fill="url(#glow)"
filter="url(#blur)">
<animate attributeName="cy"
values="120;170;120"
dur="10s"
repeatCount="indefinite"/>
</circle>

<!-- Glass -->

<rect
x="50"
y="50"
width="800"
height="420"
rx="28"
fill="white"
fill-opacity=".05"
stroke="white"
stroke-opacity=".08"/>

<!-- Window Controls -->

<circle cx="82" cy="82" r="6" fill="#FF5F57"/>
<circle cx="104" cy="82" r="6" fill="#FEBC2E"/>
<circle cx="126" cy="82" r="6" fill="#28C840"/>

<!-- Title -->

<text
x="90"
y="140"
fill="white"
font-size="42"
font-family="Inter"
font-weight="700">
SalesSphere
</text>

<text
x="90"
y="172"
fill="#A1A1AA"
font-size="18"
font-family="Inter">
Enterprise Sales Intelligence Dashboard
</text>

<!-- KPI Cards -->

<rect
x="90"
y="215"
width="180"
height="110"
rx="18"
fill="white"
fill-opacity=".04"
stroke="white"
stroke-opacity=".08"/>

<text x="112" y="245" fill="#A1A1AA" font-size="14" font-family="Inter">
Revenue
</text>

<text x="112" y="285" fill="white" font-size="34" font-family="Inter" font-weight="700">
₹12.4M
</text>

<text x="112" y="308" fill="#7EE787" font-size="16" font-family="Inter">
▲ 18.4%
</text>

<!-- Second Card -->

<rect
x="90"
y="345"
width="180"
height="90"
rx="18"
fill="white"
fill-opacity=".04"
stroke="white"
stroke-opacity=".08"/>

<text x="112" y="377" fill="#A1A1AA" font-size="14">
Orders
</text>

<text x="112" y="410" fill="white" font-size="28" font-weight="700">
5,824
</text>

<!-- Chart -->

<rect
x="320"
y="205"
width="460"
height="230"
rx="20"
fill="white"
fill-opacity=".04"
stroke="white"
stroke-opacity=".08"/>

<text
x="350"
y="240"
fill="#A1A1AA"
font-size="15"
font-family="Inter">
Quarterly Revenue
</text>

<!-- Grid -->

<g opacity=".12">

<line x1="350" y1="380" x2="750" y2="380" stroke="white"/>
<line x1="350" y1="330" x2="750" y2="330" stroke="white"/>
<line x1="350" y1="280" x2="750" y2="280" stroke="white"/>

</g>

<!-- Line -->

<path
d="M360 360
L430 335
L500 345
L575 280
L645 295
L725 230"

stroke="url(#gold)"
stroke-width="5"
stroke-linecap="round"
stroke-linejoin="round"
filter="url(#shadow)">

<animate
attributeName="stroke-dasharray"
values="0 600;600 0"
dur="2.5s"
fill="freeze"/>

</path>

<!-- Points -->

<g fill="#E8D1A7">

<circle cx="430" cy="335" r="6"/>
<circle cx="500" cy="345" r="6"/>
<circle cx="575" cy="280" r="6"/>
<circle cx="645" cy="295" r="6"/>
<circle cx="725" cy="230" r="6"/>

</g>

<!-- Tags -->

<rect x="90" y="455" width="90" height="30" rx="15" fill="#5B4420"/>
<text x="135" y="474" fill="white" font-size="13" text-anchor="middle">React</text>

<rect x="190" y="455" width="90" height="30" rx="15" fill="#735425"/>
<text x="235" y="474" fill="white" font-size="13" text-anchor="middle">ETL</text>

<rect x="290" y="455" width="110" height="30" rx="15" fill="#8C6730"/>
<text x="345" y="474" fill="white" font-size="13" text-anchor="middle">Analytics</text>

<rect x="410" y="455" width="120" height="30" rx="15" fill="#A57A38"/>
<text x="470" y="474" fill="white" font-size="13" text-anchor="middle">Dashboard</text>

</svg>