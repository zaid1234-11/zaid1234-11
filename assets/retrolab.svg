<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="900" y2="520">
    <stop offset="0%" stop-color="#0B0B12"/>
    <stop offset="100%" stop-color="#171722"/>
  </linearGradient>

  <linearGradient id="accent" x1="120" y1="80" x2="760" y2="420">
    <stop offset="0%" stop-color="#FF3B30"/>
    <stop offset="100%" stop-color="#FF6B57"/>
  </linearGradient>

  <filter id="blur">
    <feGaussianBlur stdDeviation="40"/>
  </filter>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity=".45"/>
  </filter>
</defs>

<!-- Background -->
<rect width="900" height="520" rx="34" fill="url(#bg)"/>

<!-- Ambient -->
<circle cx="720" cy="120" r="180" fill="#FF3B30" opacity=".25" filter="url(#blur)">
  <animate attributeName="cy" values="120;160;120" dur="8s" repeatCount="indefinite"/>
</circle>

<!-- Window -->
<rect
x="50"
y="50"
width="800"
height="420"
rx="28"
fill="white"
fill-opacity=".04"
stroke="white"
stroke-opacity=".08"/>

<!-- Window Controls -->
<circle cx="82" cy="82" r="6" fill="#FF5F57"/>
<circle cx="104" cy="82" r="6" fill="#FEBC2E"/>
<circle cx="126" cy="82" r="6" fill="#28C840"/>

<!-- Title -->
<text
x="90"
y="135"
fill="white"
font-size="42"
font-family="Inter,Segoe UI,sans-serif"
font-weight="700">
RetroLab
</text>

<text
x="90"
y="165"
fill="#9CA3AF"
font-size="18"
font-family="Inter,Segoe UI,sans-serif">
Transform • Share • Compete
</text>

<!-- Original Image -->
<rect
x="90"
y="215"
width="170"
height="170"
rx="18"
fill="#101827"
stroke="white"
stroke-opacity=".08"/>

<!-- Sky -->
<rect
x="108"
y="233"
width="134"
height="52"
rx="10"
fill="#6EC6FF"/>

<!-- Mountains -->
<path
d="M108 345 L140 285 L172 320 L196 275 L242 345 Z"
fill="#4B5563"/>

<!-- Sun -->
<circle cx="215" cy="252" r="10" fill="#FFD54A"/>

<!-- Caption -->
<text
x="175"
y="410"
fill="white"
font-size="14"
text-anchor="middle"
font-family="Inter">
Original
</text>

<!-- Arrow -->
<path
d="M285 300H345"
stroke="url(#accent)"
stroke-width="5"
stroke-linecap="round"/>

<path
d="M333 290L346 300L333 310"
stroke="url(#accent)"
stroke-width="5"
stroke-linecap="round"
stroke-linejoin="round"/>

<!-- Output Container -->
<rect
x="370"
y="190"
width="430"
height="220"
rx="20"
fill="white"
fill-opacity=".03"
stroke="white"
stroke-opacity=".08"/>

<!-- Dithering -->
<rect
x="390"
y="215"
width="110"
height="110"
rx="12"
fill="#101827"/>

<g fill="#FF5A4A">
<circle cx="405" cy="232" r="2"/>
<circle cx="420" cy="245" r="2"/>
<circle cx="435" cy="235" r="2"/>
<circle cx="452" cy="255" r="2"/>
<circle cx="470" cy="278" r="2"/>
<circle cx="430" cy="300" r="2"/>
<circle cx="485" cy="312" r="2"/>
<circle cx="405" cy="315" r="2"/>
</g>

<text
x="445"
y="345"
fill="white"
font-size="13"
text-anchor="middle"
font-family="Inter">
Dithering
</text>

<!-- ASCII -->
<rect
x="530"
y="215"
width="110"
height="110"
rx="12"
fill="#101827"/>

<text
x="585"
y="255"
fill="#FF6B57"
font-size="16"
text-anchor="middle"
font-family="monospace">
# @ % *
</text>

<text
x="585"
y="278"
fill="#FF6B57"
font-size="16"
text-anchor="middle"
font-family="monospace">
+ = : .
</text>

<text
x="585"
y="345"
fill="white"
font-size="13"
text-anchor="middle"
font-family="Inter">
ASCII
</text>

<!-- Pixel -->
<rect
x="670"
y="215"
width="110"
height="110"
rx="12"
fill="#101827"/>

<g fill="#FF3B30">
<rect x="686" y="232" width="14" height="14"/>
<rect x="702" y="232" width="14" height="14"/>
<rect x="718" y="248" width="14" height="14"/>
<rect x="734" y="264" width="14" height="14"/>
<rect x="702" y="280" width="14" height="14"/>
<rect x="686" y="296" width="14" height="14"/>
</g>

<text
x="725"
y="345"
fill="white"
font-size="13"
text-anchor="middle"
font-family="Inter">
Pixel Art
</text>

<!-- Community Stats -->
<rect
x="390"
y="365"
width="390"
height="28"
rx="14"
fill="#1E1E28"/>

<circle cx="415" cy="379" r="4" fill="#FF3B30"/>
<text x="430" y="384" fill="white" font-size="13" font-family="Inter">Community Gallery</text>

<circle cx="575" cy="379" r="4" fill="#FF6B57"/>
<text x="590" y="384" fill="white" font-size="13" font-family="Inter">Weekly Challenges</text>

<!-- Tags -->
<g font-family="Inter" font-size="13">

<rect x="90" y="430" width="90" height="30" rx="15" fill="#441111"/>
<text x="135" y="449" fill="white" text-anchor="middle">AI</text>

<rect x="190" y="430" width="100" height="30" rx="15" fill="#5B1818"/>
<text x="240" y="449" fill="white" text-anchor="middle">Dithering</text>

<rect x="300" y="430" width="80" height="30" rx="15" fill="#6F1D1D"/>
<text x="340" y="449" fill="white" text-anchor="middle">ASCII</text>

<rect x="390" y="430" width="90" height="30" rx="15" fill="#862020"/>
<text x="435" y="449" fill="white" text-anchor="middle">Pixel</text>

<rect x="490" y="430" width="120" height="30" rx="15" fill="#A12424"/>
<text x="550" y="449" fill="white" text-anchor="middle">Competitions</text>

</g>

</svg>