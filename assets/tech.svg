<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech constellation</title>
  <desc id="desc">A spacious constellation of tools revealed after product outcomes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520"><stop stop-color="#050608"/><stop offset=".58" stop-color="#10131A"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <linearGradient id="path" x1="230" y1="400" x2="1030" y2="134"><stop stop-color="#7DE7E0"/><stop offset=".5" stop-color="#7AA7FF"/><stop offset="1" stop-color="#E8C875"/></linearGradient>
    <filter id="blur" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="40"/></filter>
    <style>.k{font:700 12px Arial,sans-serif;letter-spacing:4px}.h{font:700 82px Arial,sans-serif}.group{font:700 22px Arial,sans-serif}.tools{font:600 13px Arial,sans-serif;letter-spacing:1px}.ghost{font:700 150px Arial,sans-serif;letter-spacing:-8px}</style>
  </defs>
  <rect width="1200" height="520" rx="36" fill="url(#bg)"/>
  <ellipse cx="760" cy="260" rx="360" ry="160" fill="#7AA7FF" opacity=".08" filter="url(#blur)"/>
  <text x="80" y="86" class="k" fill="#7DE7E0">TOOLS</text>
  <text x="78" y="194" class="h" fill="#F7F8FA">Tools orbit</text>
  <text x="78" y="286" class="h" fill="#F7F8FA">outcomes.</text>
  <path d="M274 384C412 206 550 434 688 286C824 140 916 248 1038 134" stroke="url(#path)" stroke-width="4" stroke-linecap="round"/>
  <g>
    <circle cx="274" cy="384" r="8" fill="#7DE7E0"/><text x="306" y="390" class="group" fill="#F7F8FA">Frontend</text><text x="306" y="416" class="tools" fill="#AEB7C5">React Next TypeScript</text>
    <circle cx="504" cy="312" r="8" fill="#A996FF"/><text x="532" y="288" class="group" fill="#F7F8FA">AI</text><text x="532" y="314" class="tools" fill="#AEB7C5">OpenAI Claude Gemini</text>
    <circle cx="688" cy="286" r="8" fill="#7AA7FF"/><text x="716" y="322" class="group" fill="#F7F8FA">Backend</text><text x="716" y="348" class="tools" fill="#AEB7C5">Node Supabase SQL</text>
    <circle cx="886" cy="220" r="8" fill="#E8C875"/><text x="914" y="214" class="group" fill="#F7F8FA">Design</text><text x="914" y="240" class="tools" fill="#AEB7C5">Figma Motion Systems</text>
    <circle cx="1038" cy="134" r="8" fill="#F4A7B9"/><text x="956" y="98" class="group" fill="#F7F8FA">Cloud</text><text x="956" y="124" class="tools" fill="#AEB7C5">Vercel GitHub</text>
  </g>
  <text x="930" y="482" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: constellation, not badge wall -->
</svg>
