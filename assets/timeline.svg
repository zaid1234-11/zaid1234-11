<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Learn Build Ship Scale roadmap</title>
  <desc id="desc">A spacious roadmap poster using stages first and years second.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420"><stop stop-color="#07090D"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <linearGradient id="line" x1="184" y1="296" x2="1038" y2="154"><stop stop-color="#7DE7E0"/><stop offset=".34" stop-color="#A996FF"/><stop offset=".68" stop-color="#E8C875"/><stop offset="1" stop-color="#F4A7B9"/></linearGradient>
    <style>.k{font:700 12px Arial,sans-serif;letter-spacing:4px}.h{font:700 70px Arial,sans-serif}.stage{font:700 30px Arial,sans-serif}.year{font:600 14px Arial,sans-serif;letter-spacing:2px}.ghost{font:700 130px Arial,sans-serif;letter-spacing:-8px}</style>
  </defs>
  <rect width="1200" height="420" rx="36" fill="url(#bg)"/>
  <text x="80" y="82" class="k" fill="#7DE7E0">ROADMAP</text>
  <text x="78" y="174" class="h" fill="#F7F8FA">Momentum</text>
  <path d="M184 296C360 166 482 340 636 230C800 112 890 232 1038 154" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <g>
    <circle cx="184" cy="296" r="8" fill="#7DE7E0"/><text x="146" y="350" class="stage" fill="#F7F8FA">Learn</text><text x="166" y="378" class="year" fill="#AEB7C5">2023</text>
    <circle cx="446" cy="234" r="8" fill="#A996FF"/><text x="410" y="192" class="stage" fill="#F7F8FA">Build</text><text x="426" y="220" class="year" fill="#AEB7C5">2024</text>
    <circle cx="720" cy="186" r="8" fill="#E8C875"/><text x="688" y="250" class="stage" fill="#F7F8FA">Ship</text><text x="702" y="278" class="year" fill="#AEB7C5">2025</text>
    <circle cx="1038" cy="154" r="8" fill="#F4A7B9"/><text x="984" y="112" class="stage" fill="#F7F8FA">Scale</text><text x="1018" y="140" class="year" fill="#AEB7C5">2026</text>
  </g>
  <text x="930" y="390" class="ghost" fill="#FFFFFF" fill-opacity=".035">ZS</text>
  <!-- inspect: story beats, not date boxes -->
</svg>
